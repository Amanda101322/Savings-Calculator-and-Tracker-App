<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="vieport" content="width=device-width, initial-scale=1.0">
    <title>PiggyBank Calculator And Tracker </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tracker-container">
        <div class="top-row">
            <button id="theme-toggle"> Dark Mode</button>
            <button id="reset-btn" class="danger-btn"> Reset Account</button>
        </div>
    
        <h1>Piggy Bank Calculator And Tracker</h1>
        <p class="subtitle"><em>"Save now and save your life from future misery"</em></p>

        <hr>

        <div class="section">
            <h3>Set Your Goal</h3>
            <input type="text" id="goal-name" placeholder="What are you saving for? (e.g, Laptop)">

            <label for="currency-select" class="label-text">Select Currency Layout:</label>
            <select id="currency-select">
                <option value="">Naira (N)</option>
                <option value="$"US Dollar ($)</option>
                <option value="Pound ()</option>
                <option value="CA$"<CAD (CA$)</option>
                <option value="Euro" ()</option></option>
            </select>

            <input type="number" id="goal-amount" placeholder=""Target Amount">
            <button id="set-goal-btn">Set Goal</button>
            </div>

            <div class="section display-section">
                <h2 id="progress-text">Set a goal to start</h2>
                <p id="translation-text" class="translation-box"></p>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill"></div>
                </div>
            </div>

            <div class="section">
               <h3> Drop Coins In The Bank</h3>
               <input type="number" id="deposit-amount" placeholder="Amount to add">

               <label for="deposit-date" classs="label-text">Transaction Date</label>
               <input type="text" id="deposit-date">

               <label for="deposit-note" class="label-text">Transaction Remark (Optional):</label>
               <input type="text" id="deposit-note" placeholde="e.g., Cash from uncle, side hustle">

               <button id="deposit-btn">Deposit </button>
            </div>

            <div class="section history-section">
                <h3> Progress Monitor (History Log)</h3>
                <ul id ="history-log"></ul>
            </div>
        </div>

        <script src="script.js"></script>
</body>
</html>
